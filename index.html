<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RRB ALP Dashboard — South East Central Railway</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0ead9;
      min-height: 100vh;
      padding: 16px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: #f5efe1;
      border-radius: 15px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      background: #0f2a3a;
      color: #fff;
      border-top: 5px dashed #e0a030;
      padding: 16px 22px 18px;
      position: relative;
    }
    .header-inner { display: flex; align-items: center; justify-content: space-between; gap: 14px; }
    .logo-circle { display: none; }
    .header-text { text-align: left; flex: 1; }
    .header-text .eyebrow { font-size: 0.7em; letter-spacing: 3px; color: #9fb3bf; text-transform: uppercase; margin-bottom: 6px; }
    .header-text .title { font-size: 2em; font-weight: bold; letter-spacing: 1px; color: #e0a030; }
    .header-text .sub { font-size: 0.82em; color: #f0ead9; font-weight: bold; letter-spacing: 1px; margin-top: 6px; text-transform: uppercase; }
    .header-text .sub2 { font-size: 0.75em; color: #f0ead9; opacity: .7; letter-spacing: .5px; }
    .live-clock {
      display: flex; align-items: center; gap: 10px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(224,160,48,0.4);
      border-radius: 8px;
      padding: 8px 16px;
      flex-shrink: 0;
    }
    .live-dot {
      width: 9px; height: 9px; border-radius: 50%;
      background: #4caf50;
      box-shadow: 0 0 6px #4caf50;
      animation: livePulse 1.6s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes livePulse {
      0%, 100% { opacity: 1; }
      50% { opacity: .35; }
    }
    .live-clock-text { text-align: right; }
    .live-time { font-size: 1.15em; font-weight: bold; color: #e0a030; letter-spacing: 1px; font-variant-numeric: tabular-nums; line-height: 1.1; }
    .live-date { font-size: 0.68em; color: #f0ead9; opacity: .75; letter-spacing: .5px; text-transform: uppercase; margin-top: 2px; }

    /* ── Dashboard Body ── */
    .dash-body { padding: 20px; background: #f0ead9; }

    /* ── Stats Cards ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 20px;
    }
    .stat-card {
      background: #fff;
      border-radius: 10px;
      padding: 16px;
      box-shadow: 0 4px 15px rgba(0,0,0,.1);
      border-left: 4px solid #0f2a3a;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .stat-card.gold { border-left-color: #e0a030; }
    .stat-card.green { border-left-color: #27ae60; }
    .stat-card.red { border-left-color: #e74c3c; }
    .stat-label { font-size: 11px; font-weight: bold; color: #666; text-transform: uppercase; letter-spacing: .5px; }
    .stat-value { font-size: 2em; font-weight: bold; color: #0f2a3a; line-height: 1; }
    .stat-card.gold .stat-value { color: #c47f1a; }
    .stat-card.green .stat-value { color: #27ae60; }
    .stat-card.red .stat-value { color: #e74c3c; }

    /* ── Filter Section ── */
    .filter-section {
      background: #faf6ec;
      border-radius: 10px;
      padding: 18px;
      margin-bottom: 20px;
      box-shadow: 0 4px 15px rgba(0,0,0,.1);
    }
    .filter-title {
      font-size: 0.95em; font-weight: bold;
      background: linear-gradient(135deg, #0f2a3a, #1c3d4d);
      color: #fff; padding: 7px 14px; border-radius: 6px;

    }
    .filter-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr) auto auto;

    .filter-group { display: flex; flex-direction: column; gap: 6px; }
    .filter-group label {
      font-size: 11px; font-weight: bold; color: #0f2a3a;
      text-transform: uppercase; letter-spacing: .5px;

    .filter-group select,

    .btn { padding: 9px 18px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: bold; transition: all .3s; text-transform: uppercase; letter-spacing: .5px; }
    .btn-blue { background: linear-gradient(135deg, #0f2a3a, #1c3d4d); color: #fff; }
    .btn-blue:hover { background: linear-gradient(135deg, #0a1f2c, #0f2a3a); transform: translateY(-1px); }
    .btn-green { background: linear-gradient(135deg, #27ae60, #229954); color: #fff; }
    .btn-green:hover { background: linear-gradient(135deg, #229954, #1e8449); transform: translateY(-1px); }
    .btn-red { background: linear-gradient(135deg, #c0392b, #e74c3c); color: #fff; }
    .btn-red:hover { background: linear-gradient(135deg, #a93226, #c0392b); transform: translateY(-1px); }
    .btn-sm { padding: 5px 12px; font-size: 11px; }

    /* ── Results Panel ── */
    .results-panel {
      background: #faf6ec;
      border-radius: 10px;
      padding: 18px;
      box-shadow: 0 4px 15px rgba(0,0,0,.1);
    }
    .results-title {
      font-size: 0.95em; font-weight: bold;
      background: linear-gradient(135deg, #0f2a3a, #1c3d4d);

    .table-wrap { overflow-x: auto; border-radius: 8px; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; background: #fff; }
    thead tr { background: linear-gradient(135deg, #0f2a3a, #1c3d4d); }
    thead th { color: #e0a030; font-weight: bold; padding: 10px 10px; text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: .5px; white-space: nowrap; }
    tbody tr { border-bottom: 1px solid #e0eaf5; transition: background .2s; }

    tbody tr:nth-child(even) { background: #f8fbff; }
    tbody tr:nth-child(even):hover { background: #eaf4fd; }
    tbody td { padding: 9px 10px; color: #0f2a3a; vertical-align: top; }
    .badge {
      display: inline-block; padding: 2px 8px;
      border-radius: 12px; font-size: 10px; font-weight: bold;
      background: #e3f2fd; color: #1565c0;
    }

    /* ── CLI Trainee Grid ── */
    .trainee-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    .trainee-card {
      background: #fff;
      border: 2px solid #b3d9ff;
      border-radius: 8px;
      padding: 14px;
      cursor: pointer;
      transition: all .2s;

    .trainee-card:hover { border-color: #0f2a3a; box-shadow: 0 4px 15px rgba(26,35,126,.15); transform: translateY(-2px); }
    .trainee-card .tc-name { font-size: 13px; font-weight: bold; color: #0f2a3a; margin-bottom: 6px; }
    .trainee-card .tc-detail { font-size: 11px; color: #555; margin-bottom: 2px; }
    .trainee-card .tc-count { font-size: 10px; color: #27ae60; font-weight: bold; margin-top: 8px; }

    /* ── Empty / Loading ── */
    .empty-state {
      text-align: center; padding: 48px 24px; color: #888;
    }
    .empty-state .icon { font-size: 3em; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; }

    .loading {
      text-align: center; padding: 32px; color: #0f2a3a; font-weight: bold;
    }

    /* ── Toast ── */
    #toast {
      display: none; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      padding: 12px 28px; border-radius: 8px; font-size: 14px; font-weight: bold;
      color: #fff; z-index: 9999; box-shadow: 0 4px 20px rgba(0,0,0,.3);
      animation: fadeIn .3s ease;
    }
    #toast.success { background: #27ae60; }
    #toast.error { background: #e74c3c; }
    #toast.info { background: #0f2a3a; }
    @keyframes fadeIn { from { opacity: 0; bottom: 15px; } to { opacity: 1; bottom: 30px; } }

    .action-row { display: flex; gap: 10px; justify-content: flex-end; margin-top: 14px; flex-wrap: wrap; }

    /* ── Tabs ── */
    .tab-bar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .tab {
      padding: 7px 16px; border-radius: 6px; font-size: 12px; font-weight: bold;
      cursor: pointer; border: 2px solid #b3d9ff; background: #fff; color: #0f2a3a;
      transition: all .2s; text-transform: uppercase; letter-spacing: .5px;
    }
    .tab.active { background: linear-gradient(135deg, #0f2a3a, #1c3d4d); color: #e0a030; border-color: #0f2a3a; }
    .tab:hover:not(.active) { border-color: #0f2a3a; }

    @media (max-width: 992px) {
      .filter-grid { grid-template-columns: 1fr 1fr 1fr; }
    }
    @media (max-width: 768px) {
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .filter-grid { grid-template-columns: 1fr 1fr; }
      .filter-grid .btn { width: 100%; }
      .trainee-info { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 480px) {
      .filter-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 480px) {
      .stats-row { grid-template-columns: 1fr; }
    }
  </style>
</head>

      <div class="action-row" id="pdfRow" style="display:none;">

      </div>

      </div>

  </div>

<div id="toast"></div>

<script>
// ════════════════════════════════════════════════════════
//  CONFIG — same sheet URLs as the form
// ════════════════════════════════════════════════════════
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbygRjVKy8QjUbre-Np0oAETFq9y6FNqawYZbiJ6z5rSLu_V8ytWevvp_xnK25Ya7L6l/exec';
const SUBMIT_SHEET_ID  = '1itfeMUmvvrIKt5F6lSsTsIi6os42DeO7Plnligiqfg4';
const TRAINEE_SHEET_ID = '1Yn450uce02hgfbXJmRzd9aBY6bBEgaginXOctu--izg';

// NEW: Apps Script web app endpoint that serves the SUBMIT sheet as JSON.
// This is the primary read path now (faster + no CORS-proxy dependency).
// Paste the matching doGet() from Code.gs into the Apps Script project
// deployed at this URL — see the accompanying Code.gs file.
const APP_URL = 'https://script.google.com/macros/s/AKfycbzBiQy6NPp81IlbtlpCebIgKhdoGoy34BEja-kYssyOM400py4VuMRC8no4vH3lUsXFlA/exec';

const SUBMIT_CSV  = `https://docs.google.com/spreadsheets/d/${SUBMIT_SHEET_ID}/export?format=csv&gid=0`;
const TRAINEE_CSV = `https://docs.google.com/spreadsheets/d/${TRAINEE_SHEET_ID}/export?format=csv&gid=0`;

const CORS = [
  u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
];

// ════════════════════════════════════════════════════════
//  DATA STORE
// ════════════════════════════════════════════════════════
// Each record (row from submit sheet):
// { timestamp, traineeName, designation, hq, hrms, nominatedCLI,
//   entryNo, date, trainNo, locoNo, fromStation, depTime,
//   toStation, arrTime, footplateKm, lpAlpName, itemsDiscussed, ccSmName }
let allRecords = [];
let traineeProfiles = {}; // name -> { designation, hq, hrms }
let currentTab = 'trainees';

// ════════════════════════════════════════════════════════
//  CSV PARSER
// ════════════════════════════════════════════════════════
function parseCSV(text) {
  const rows = [];
  for (const line of text.split(/\r?\n/)) {
    if (!line.trim()) continue;
    const row = []; let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { row.push(cur.trim()); cur = ''; }
      else { cur += ch; }
    }
    row.push(cur.trim());
    rows.push(row);
  }
  return rows;
}

// ════════════════════════════════════════════════════════
//  FETCH WITH FALLBACKS
// ════════════════════════════════════════════════════════
async function fetchCSV(url) {
  // Try direct
  try {
    const r = await fetch(url, { signal: AbortSignal.timeout(8000) });
    if (r.ok) return await r.text();
  } catch(e) {}
  // Try CORS proxies
  for (const proxy of CORS) {
    try {
      const r = await fetch(proxy(url), { signal: AbortSignal.timeout(10000) });
      if (r.ok) return await r.text();
    } catch(e) {}
  }
  throw new Error('All fetch strategies failed');
}

// Fetch the submission sheet via the Apps Script web app as JSON.
// Returns a 2D array of rows (row 0 = headers), same shape parseCSV()
// would produce, so it can drop straight into the existing logic below.
async function fetchRowsFromAppScript() {
  const r = await fetch(`${APP_URL}?action=getData&sheet=submit`, { signal: AbortSignal.timeout(10000) });
  if (!r.ok) throw new Error('Apps Script endpoint returned ' + r.status);
  const json = await r.json();
  if (!json.success) throw new Error(json.error || 'Apps Script returned an error');
  return json.rows;
}

// ════════════════════════════════════════════════════════
//  LOAD DATA
// ════════════════════════════════════════════════════════
async function loadData() {
  document.getElementById('loadingMsg').style.display = 'block';
  document.getElementById('loadingMsg').textContent = '⏳ Loading submission data…';

  try {
    // Load submission sheet — try the Apps Script JSON endpoint first,
    // fall back to the old CSV+proxy method if that fails for any reason.
    let rows;
    try {
      rows = await fetchRowsFromAppScript();
    } catch (appScriptErr) {
      console.warn('Apps Script fetch failed, falling back to CSV:', appScriptErr);
      const csv = await fetchCSV(SUBMIT_CSV);
      rows = parseCSV(csv);
    }
    if (rows.length < 2) throw new Error('No submission data found');

    const h = rows[0].map(x => x.trim().toUpperCase());
    // Column order per Apps Script:
    // A:Timestamp B:TraineeName C:Designation D:HQ E:HRMSID F:NominatedCLI
    // G:EntryNo H:Date I:TrainNo J:LocoNo K:From L:DepTime
    // M:To N:ArrTime O:FootplateKM P:LPALPName Q:ItemsDiscussed R:CCSmName

    allRecords = [];
    for (let i = 1; i < rows.length; i++) {
      const r = rows[i];
      if (!r[1] && !r[0]) continue; // skip empty
      allRecords.push({
        timestamp:      r[0]  || '',
        traineeName:    (r[1]  || '').trim().toUpperCase(),
        designation:    r[2]  || '',
        hq:             r[3]  || '',
        hrms:           r[4]  || '',
        nominatedCLI:   (r[5]  || '').trim(),
        entryNo:        r[6]  || '',
        date:           r[7]  || '',
        trainNo:        r[8]  || '',
        locoNo:         r[9]  || '',
        fromStation:    (r[10] || '').trim().toUpperCase(),
        depTime:        r[11] || '',
        toStation:      (r[12] || '').trim().toUpperCase(),
        arrTime:        r[13] || '',
        footplateKm:    r[14] || '',
        lpAlpName:      r[15] || '',
        itemsDiscussed: r[16] || '',
        ccSmName:       r[17] || '',
      });
    }

    // Also load trainee profiles (for HQ, designation, hrms)
    try {
      const tcsv = await fetchCSV(TRAINEE_CSV);
      const trows = parseCSV(tcsv);
      if (trows.length > 1) {
        const th = trows[0].map(x => x.trim().toUpperCase());
        const ni = th.findIndex(h => h.includes('NAME'));
        const di = th.findIndex(h => h.includes('DESIG'));
        const hi = th.findIndex(h => h === 'HQ' || h.includes('H.Q') || h.includes('HEAD'));
        const ri = th.findIndex(h => h.includes('HRMS'));
        for (let i = 1; i < trows.length; i++) {
          const tr = trows[i];
          const name = ni >= 0 ? tr[ni].trim().toUpperCase() : '';
          if (!name) continue;
          traineeProfiles[name] = {
            designation: di >= 0 ? tr[di] : '',
            hq:          hi >= 0 ? tr[hi] : '',
            hrms:        ri >= 0 ? tr[ri] : '',
          };
        }
      }
    } catch(e) { /* trainee profile load failed — not critical */ }

    buildUI();
    showToast(`✅ ${allRecords.length} records loaded`, 'success');
  } catch(err) {
    document.getElementById('loadingMsg').textContent = '⚠️ Could not load data. Make sure the submission sheet is publicly accessible.';
    showToast('❌ Failed to load data', 'error');
    console.error(err);
    // Load demo data for preview
    loadDemoData();
  }
}

// ════════════════════════════════════════════════════════
//  UNIFIED FILTER ENGINE
//  Reads every filter control (CLI, Trainee, From Stn, To Stn,
//  From Date, To Date) and renders the view that matches
//  whichever combination is currently selected.
// ════════════════════════════════════════════════════════
function getFilterValues() {
  return {
    cli:         document.getElementById('filterCLI').value,
    trainee:     document.getElementById('filterTrainee').value,
    fromStation: document.getElementById('filterFromStation').value,
    toStation:   document.getElementById('filterToStation').value,
    fromVal:     document.getElementById('filterFromDate').value,
    toVal:       document.getElementById('filterToDate').value,
  };
}

function applyFilters() {
  const f = getFilterValues();
  const hasStation = !!(f.fromStation || f.toStation);
  const hasDate = !!(f.fromVal || f.toVal);

  // Nothing selected at all — default grouped-by-trainee summary
  if (!f.cli && !f.trainee && !hasStation && !hasDate) {
    renderDefault();
    return;
  }

  // Only a CLI selected — keep the original card-based CLI view
  if (f.cli && !f.trainee && !hasStation && !hasDate) {
    const records = allRecords.filter(r => r.nominatedCLI === f.cli);
    renderCLIView(f.cli, records);
    return;
  }

  // Only a Trainee selected — keep the original trainee detail view
  if (f.trainee && !hasStation && !hasDate) {
    renderTraineeView(f.trainee);
    return;
  }

  // Any other combination (station and/or date, optionally narrowed
  // further by CLI/Trainee) — build a flat, fully-filtered entries table
  let records = allRecords;
  if (f.trainee) records = records.filter(r => r.traineeName === f.trainee);
  else if (f.cli) records = records.filter(r => r.nominatedCLI === f.cli);

  if (f.fromStation) records = records.filter(r => r.fromStation === f.fromStation);
  if (f.toStation) records = records.filter(r => r.toStation === f.toStation);

  if (hasDate) {
    const fromDate = f.fromVal ? new Date(f.fromVal + 'T00:00:00') : null;
    const toDate = f.toVal ? new Date(f.toVal + 'T23:59:59') : null;
    records = records.filter(r => {
      const d = parseRecordDate(r.date);
      if (!d) return false;
      if (fromDate && d < fromDate) return false;
      if (toDate && d > toDate) return false;
      return true;
    });
  }

  renderFilteredView(records, f);
}

// ════════════════════════════════════════════════════════
//  GENERATE SUMMARY PDF
// ════════════════════════════════════════════════════════
function generateSummaryPDF() {
  try {
    const byCLI = window._summaryData;
    if (!byCLI) { showToast('❌ Generate the summary first', 'error'); return; }

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
    const pageW = doc.internal.pageSize.getWidth();
    const pageH = doc.internal.pageSize.getHeight();
    const margin = 10;
    const tableW = pageW - margin * 2; // table + CLI heading both use this exact width

    // ── Plain black/white header (no colour, compact) ──
    doc.setTextColor(0, 0, 0);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(12);
    doc.text('SOUTH EAST CENTRAL RAILWAY — RAIPUR DIVISION', pageW / 2, 12, { align: 'center' });
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(9);
    doc.text('CLI-wise Trainee Summary Report', pageW / 2, 17, { align: 'center' });

    const ts = new Date().toLocaleString('en-IN', { timeZone: 'Asia/Kolkata' });
    doc.setFontSize(7);
    doc.text('Generated: ' + ts, pageW - margin, 17, { align: 'right' });

    doc.setLineWidth(0.3);
    doc.line(margin, 20, pageW - margin, 20);

    let y = 25;
    const cliNames = Object.keys(byCLI).sort();
    // Fixed column widths summing exactly to tableW, so the CLI heading
    // line above always lines up with the table edges below it.
    const colW = { 0: 10, 1: 0, 2: 45, 3: 28, 4: 40, 5: 24, 6: 30 };
    colW[1] = tableW - (colW[0] + colW[2] + colW[3] + colW[4] + colW[5] + colW[6]); // Trainee Name takes the remainder

    cliNames.forEach(cli => {
      const trainees = Object.entries(byCLI[cli]).sort((a, b) => a[0].localeCompare(b[0]));
      const totalKm = trainees.reduce((s, [, d]) => s + d.records.reduce((s2, r) => s2 + (parseFloat(r.footplateKm) || 0), 0), 0);
      const totalEntries = trainees.reduce((s, [, d]) => s + d.records.length, 0);

      // Avoid an orphaned heading at the bottom of a page
      if (y > pageH - 30) { doc.addPage(); y = 14; }

      // ── Plain CLI heading line, same left/right edges as the table ──
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(9);
      doc.setTextColor(0, 0, 0);
      doc.text(`CLI: ${cli}`, margin, y);
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(7.5);
      doc.text(`${trainees.length} Trainees   |   ${totalEntries} Entries   |   ${Math.round(totalKm)} KM`, pageW - margin, y, { align: 'right' });
      y += 1.5;
      doc.setLineWidth(0.15);
      doc.line(margin, y, pageW - margin, y);
      y += 3;

      const head = [['#', 'Trainee Name', 'Designation', 'HQ', 'HRMS ID', 'Entries', 'Total KM']];
      const body = trainees.map(([name, d], i) => {
        const km = d.records.reduce((s, r) => s + (parseFloat(r.footplateKm) || 0), 0);
        return [i + 1, name, d.desig || '', d.hq || '', d.hrms || '', d.records.length, Math.round(km)];
      });
      const foot = [[
        { content: 'TOTAL KM', colSpan: 6, styles: { halign: 'right' } },
        Math.round(totalKm)
      ]];

      doc.autoTable({
        startY: y,
        head, body, foot,
        theme: 'grid',
        tableWidth: tableW,
        margin: { left: margin, right: margin },
        styles: { fontSize: 7, cellPadding: 1.2, textColor: [0, 0, 0], lineColor: [0, 0, 0], lineWidth: 0.1 },
        headStyles: { fillColor: 255, textColor: [0, 0, 0], fontStyle: 'bold', halign: 'center', lineWidth: 0.15 },
        footStyles: { fillColor: 255, textColor: [0, 0, 0], fontStyle: 'bold', lineWidth: 0.15 },
        bodyStyles: { fillColor: 255 },
        alternateRowStyles: { fillColor: 255 },
        columnStyles: {
          0: { cellWidth: colW[0], halign: 'center' },
          1: { cellWidth: colW[1] },
          2: { cellWidth: colW[2] },
          3: { cellWidth: colW[3] },
          4: { cellWidth: colW[4] },
          5: { cellWidth: colW[5], halign: 'center' },
          6: { cellWidth: colW[6], halign: 'center' },
        },
      });

      y = doc.lastAutoTable.finalY + 6;
    });

    // ── Footer page numbers ──
    const pages = doc.internal.getNumberOfPages();
    for (let p = 1; p <= pages; p++) {
      doc.setPage(p);
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(7);
      doc.setTextColor(90, 90, 90);
      doc.text('South East Central Railway — Raipur Division | CLI-wise Trainee Summary Report', margin, pageH - 5);
      doc.text(`Page ${p} of ${pages}`, pageW - margin, pageH - 5, { align: 'right' });
    }

    doc.save(`CLI_Summary_Report_${new Date().toISOString().slice(0,10)}.pdf`);
    showToast('✅ Summary PDF downloaded!', 'success');
  } catch (err) {
    console.error(err);
    showToast('❌ Summary PDF generation failed', 'error');
  }
}

// ════════════════════════════════════════════════════════
//  DATE RANGE FILTER
// ════════════════════════════════════════════════════════
// Parses a record's date string (which may come through in several
// formats depending on how the sheet stored it: ISO "2025-06-15",
// "2025-06-15T00:00:00.000Z", "15/06/2025", "6/15/2025", etc.)
// into a Date object we can compare. Returns null if unparseable.
function parseRecordDate(str) {
  if (!str) return null;
  str = String(str).trim();

  // ISO format: 2025-06-15 or 2025-06-15T...
  let m = str.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (m) return new Date(+m[1], +m[2] - 1, +m[3]);

  // dd/mm/yyyy or d/m/yyyy (also handles dd-mm-yyyy)
  m = str.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})/);
  if (m) {
    const a = +m[1], b = +m[2], y = +m[3];
    // If first part > 12 it must be the day; otherwise assume dd/mm/yyyy
    // (this sheet is used with Indian date conventions elsewhere in the app)
    if (a > 12) return new Date(y, b - 1, a);
    return new Date(y, b - 1, a);
  }

  // Fallback to native parsing
  const d = new Date(str);
  return isNaN(d.getTime()) ? null : d;
}

function onDateFilterChange() {
  applyFilters();
}

function formatDateForLabel(val) {
  if (!val) return '';
  const [y, m, d] = val.split('-');
  return `${d}/${m}/${y}`;
}

// Formats any record date (whatever format it came in from the sheet)
// into a consistent dd/mm/yyyy string for display in the dashboard and PDF.
function formatDisplayDate(str) {
  if (!str) return '';
  const d = parseRecordDate(str);
  if (!d) return str; // fall back to raw value if unparseable
  const dd = String(d.getDate()).padStart(2, '0');
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const yyyy = d.getFullYear();
  return `${dd}/${mm}/${yyyy}`;
}

function renderFilteredView(records, f) {
  document.getElementById('tabBar').style.display = 'none';
  document.getElementById('summaryPdfRow').style.display = 'none';
  document.getElementById('pdfRow').style.display = 'flex';

  const labelParts = [];

  if (f.fromVal || f.toVal) {
    labelParts.push(
      f.fromVal && f.toVal
        ? `📅 ${formatDateForLabel(f.fromVal)} – ${formatDateForLabel(f.toVal)}`
        : f.fromVal
          ? `📅 From ${formatDateForLabel(f.fromVal)}`
          : `📅 Up to ${formatDateForLabel(f.toVal)}`
    );
  }

  if (f.fromStation || f.toStation) {
    labelParts.push(
      f.fromStation && f.toStation
        ? `🚉 ${f.fromStation} → ${f.toStation}`
        : f.fromStation
          ? `🚉 From ${f.fromStation}`
          : `🚉 To ${f.toStation}`
    );
  }

  if (f.trainee) labelParts.push(`👤 ${f.trainee}`);
  else if (f.cli) labelParts.push(`🧑‍💼 ${f.cli}`);

  document.getElementById('resultsLabel').textContent = labelParts.length
    ? `Records: ${labelParts.join(' · ')}`
    : '📋 Filtered Records';

  const km = records.reduce((s, r) => s + (parseFloat(r.footplateKm) || 0), 0);
  document.getElementById('resultsCount').textContent = `${records.length} entries | ${Math.round(km)} KM`;

  window._currentTrainee = f.trainee || 'all';
  window._currentTraineeRecords = records;
  window._currentDateRange = {
    fromVal: f.fromVal, toVal: f.toVal,
    fromStation: f.fromStation, toStation: f.toStation,
  };

  document.getElementById('resultsContent').innerHTML = buildEntriesTable(records, !f.trainee);
}

// ════════════════════════════════════════════════════════
//  RENDER TRAINEE VIEW
// ════════════════════════════════════════════════════════
function renderTraineeView(trainee) {
  document.getElementById('tabBar').style.display = 'none';
  document.getElementById('pdfRow').style.display = 'flex';
  document.getElementById('summaryPdfRow').style.display = 'none';

  const records = allRecords.filter(r => r.traineeName === trainee);
  const profile = traineeProfiles[trainee] || (records[0] ? { designation: records[0].designation, hq: records[0].hq, hrms: records[0].hrms } : {});
  const cli = records[0] ? records[0].nominatedCLI : '—';
  const km = records.reduce((s, r) => s + (parseFloat(r.footplateKm) || 0), 0);

  document.getElementById('resultsLabel').textContent = `👤 ${trainee}`;
  document.getElementById('resultsCount').textContent = `${records.length} entries | ${Math.round(km)} KM`;

  window._currentTrainee = trainee;
  window._currentTraineeRecords = records;
  window._currentDateRange = null;

  const infoHtml = `
    <div class="trainee-info">
      <div class="info-item"><div class="lbl">Name</div><div class="val">${trainee}</div></div>
      <div class="info-item"><div class="lbl">Designation</div><div class="val">${profile.designation || '—'}</div></div>
      <div class="info-item"><div class="lbl">HQ</div><div class="val">${profile.hq || '—'}</div></div>
      <div class="info-item"><div class="lbl">HRMS ID</div><div class="val">${profile.hrms || '—'}</div></div>
      <div class="info-item"><div class="lbl">Nominated CLI</div><div class="val" style="font-size:11px;">${cli}</div></div>
    </div>
  `;

  document.getElementById('resultsContent').innerHTML = infoHtml + buildEntriesTable(records);
}

// ════════════════════════════════════════════════════════
//  BUILD ENTRIES TABLE HTML
// ════════════════════════════════════════════════════════
function buildEntriesTable(records, includeTraineeCols) {
  if (!records.length) return '<div class="empty-state"><div class="icon">📭</div><p>No entries found.</p></div>';

  const rows = records.map((r, i) => {
    const traineeCells = includeTraineeCols ? `
      <td><strong>${r.traineeName || '—'}</strong></td>
      <td>${r.hq || '—'}</td>
      <td>${r.hrms || '—'}</td>
      <td>${r.nominatedCLI || '—'}</td>` : '';
    return `
    <tr>
      <td>${i + 1}</td>
      <td>${formatDisplayDate(r.date) || '—'}</td>${traineeCells}
      <td>${r.trainNo || '—'}</td>
      <td>${r.locoNo || '—'}</td>
      <td>${r.fromStation || '—'}</td>
      <td>${r.depTime || '—'}</td>
      <td>${r.toStation || '—'}</td>
      <td>${r.arrTime || '—'}</td>
      <td><strong>${r.footplateKm || '—'}</strong></td>
      <td>${r.lpAlpName || '—'}</td>
      <td style="max-width:180px;">${r.itemsDiscussed || '—'}</td>
      <td>${r.ccSmName || '—'}</td>
    </tr>
  `;
  }).join('');

  const totalKm = records.reduce((s, r) => s + (parseFloat(r.footplateKm) || 0), 0);
  const totalKmDisplay = Number.isInteger(totalKm) ? totalKm : totalKm.toFixed(1);

  const traineeHeaders = includeTraineeCols ? `
            <th>Trainee Name</th>
            <th>HQ</th>
            <th>HRMS ID</th>
            <th>Group CLI Name</th>` : '';

  const footColspan = includeTraineeCols ? 12 : 8;

  return `
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Date</th>${traineeHeaders}
            <th>Train No</th>
            <th>Loco No</th>
            <th>From</th>
            <th>Dep</th>
            <th>To</th>
            <th>Arr</th>
            <th>KM</th>
            <th>LP/ALP Name & Sign</th>
            <th>Items Discussed</th>
            <th>CC/SM Name</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
        <tfoot>
          <tr style="background:#eef3fb; border-top:2px solid #0f2a3a;">
            <td colspan="${footColspan}" style="text-align:right; font-weight:bold; color:#0f2a3a;">TOTAL KM</td>
            <td style="font-weight:bold; color:#0f2a3a;">${totalKmDisplay}</td>
            <td colspan="3"></td>
          </tr>
        </tfoot>
      </table>
    </div>
  `;
}

// ════════════════════════════════════════════════════════
//  CLEAR FILTERS
// ════════════════════════════════════════════════════════
function clearFilters() {
  document.getElementById('filterCLI').value = '';
  document.getElementById('filterTrainee').value = '';
  document.getElementById('filterFromStation').value = '';
  document.getElementById('filterToStation').value = '';
  document.getElementById('filterFromDate').value = '';
  document.getElementById('filterToDate').value = '';
  // Reset trainee dropdown to all
  const tSel = document.getElementById('filterTrainee');
  const traineeSet = new Set(allRecords.map(r => r.traineeName).filter(Boolean));
  tSel.innerHTML = '<option value="">— All Trainees —</option>';
  [...traineeSet].sort().forEach(n => {
    const o = document.createElement('option');
    o.value = n; o.textContent = n;
    tSel.appendChild(o);
  });
  renderDefault();
}

// ════════════════════════════════════════════════════════
//  GENERATE PDF
// ════════════════════════════════════════════════════════
function generatePDF() {
  try {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
    const pageW = doc.internal.pageSize.getWidth();
    const margin = 10;

    const trainee = window._currentTrainee || 'all';
    const records = window._currentTraineeRecords || allRecords;
    const profile = traineeProfiles[trainee] || (records[0] ? { designation: records[0].designation, hq: records[0].hq, hrms: records[0].hrms } : {});
    const cli = records[0] ? records[0].nominatedCLI : '';

    // ── Header ──
    doc.setFillColor(26, 35, 126);
    doc.rect(0, 0, pageW, 22, 'F');
    doc.setFontSize(14);
    doc.setTextColor(255, 215, 0);
    doc.setFont('helvetica', 'bold');
    doc.text('SOUTH EAST CENTRAL RAILWAY — RAIPUR DIVISION', pageW / 2, 9, { align: 'center' });
    doc.setFontSize(10);
    doc.text('RRB ALP HANDLING REPORT', pageW / 2, 16, { align: 'center' });

    const ts = new Date().toLocaleString('en-IN', { timeZone: 'Asia/Kolkata' });
    doc.setFontSize(7);
    doc.setTextColor(255, 215, 0);
    doc.text('Generated: ' + ts, pageW - margin, 20, { align: 'right' });

    let y = 28;

    // ── Report Period Heading ──
    const dr = window._currentDateRange;
    if (dr && (dr.fromVal || dr.toVal || dr.fromStation || dr.toStation)) {
      const labelBits = [];
      if (dr.fromVal || dr.toVal) {
        labelBits.push(`REPORT FROM DATE: ${dr.fromVal ? formatDateForLabel(dr.fromVal) : '—'}   TO REPORT TO DATE: ${dr.toVal ? formatDateForLabel(dr.toVal) : '—'}`);
      }
      if (dr.fromStation || dr.toStation) {
        labelBits.push(`STATION: ${dr.fromStation || '—'} → ${dr.toStation || '—'}`);
      }
      const periodLabel = labelBits.join('   |   ');
      doc.setFillColor(224, 160, 48);
      doc.rect(margin, y, pageW - margin * 2, 7, 'F');
      doc.setTextColor(26, 35, 126);
      doc.setFontSize(9);
      doc.setFont('helvetica', 'bold');
      doc.text(periodLabel, pageW / 2, y + 5, { align: 'center' });
      y += 11;
    }

    // ── Trainee Details ──
    if (trainee !== 'all') {
      doc.setFillColor(57, 73, 171);
      doc.rect(margin, y, pageW - margin * 2, 7, 'F');
      doc.setTextColor(255, 255, 255);
      doc.setFontSize(9);
      doc.setFont('helvetica', 'bold');
      doc.text('TRAINEE DETAILS', pageW / 2, y + 5, { align: 'center' });
      y += 10;

      const info = [
        ['Name of Trainee', trainee],
        ['Designation', profile.designation || ''],
        ['HQ', profile.hq || ''],
        ['HRMS ID', profile.hrms || ''],
        ['Nominated CLI', cli],
      ];
      const colW = (pageW - margin * 2) / 3;
      doc.setFontSize(8);
      info.forEach(([label, val], idx) => {
        const cx = margin + (idx % 3) * colW;
        const cy = y + Math.floor(idx / 3) * 10;
        doc.setFont('helvetica', 'bold');
        doc.setTextColor(26, 35, 126);
        doc.text(label + ':', cx, cy);
        doc.setFont('helvetica', 'normal');
        doc.text((val || '').toUpperCase(), cx + 38, cy);
      });
      y += Math.ceil(info.length / 3) * 10 + 4;
    }

    // ── Entries Table ──
    doc.setFillColor(57, 73, 171);
    doc.rect(margin, y, pageW - margin * 2, 7, 'F');
    doc.setTextColor(255, 255, 255);
    doc.setFontSize(9);
    doc.setFont('helvetica', 'bold');
    doc.text('HANDLING DETAILS', pageW / 2, y + 5, { align: 'center' });
    y += 9;

    const showTraineeCols = trainee === 'all';
    const tableHead = showTraineeCols
      ? [['#', 'Date', 'Trainee Name', 'HQ', 'HRMS ID', 'Group CLI Name', 'Train No', 'Loco No', 'From', 'Dep', 'To', 'Arr', 'KM', 'LP/ALP Name & Sign', 'Items Discussed', 'CC/SM']]
      : [['#', 'Date', 'Train No', 'Loco No', 'From', 'Dep', 'To', 'Arr', 'KM', 'LP/ALP Name & Sign', 'Items Discussed', 'CC/SM']];
    const tableBody = records.map((r, i) => showTraineeCols
      ? [i + 1, formatDisplayDate(r.date), r.traineeName, r.hq, r.hrms, r.nominatedCLI, r.trainNo, r.locoNo, r.fromStation, r.depTime,
         r.toStation, r.arrTime, r.footplateKm, r.lpAlpName, r.itemsDiscussed, r.ccSmName]
      : [i + 1, formatDisplayDate(r.date), r.trainNo, r.locoNo, r.fromStation, r.depTime,
         r.toStation, r.arrTime, r.footplateKm, r.lpAlpName, r.itemsDiscussed, r.ccSmName]
    );
    const totalKmPdf = records.reduce((s, r) => s + (parseFloat(r.footplateKm) || 0), 0);
    const totalKmPdfDisplay = Number.isInteger(totalKmPdf) ? totalKmPdf : totalKmPdf.toFixed(1);
    const tableFoot = showTraineeCols
      ? [[
          '', '', '', '', '', '', '', '', '', '', '',
          { content: 'TOTAL KM', styles: { halign: 'right' } },
          totalKmPdfDisplay, '', '', ''
        ]]
      : [[
          '', '', '', '', '', '', '',
          { content: 'TOTAL KM', styles: { halign: 'right' } },
          totalKmPdfDisplay, '', '', ''
        ]];

    doc.autoTable({
      startY: y,
      head: tableHead,
      body: tableBody,
      foot: tableFoot,
      margin: { left: margin, right: margin },
      styles: { fontSize: 7, cellPadding: 2, overflow: 'linebreak', textColor: [26, 35, 126] },
      headStyles: { fillColor: [26, 35, 126], textColor: [255, 215, 0], fontStyle: 'bold', halign: 'center' },
      footStyles: { fillColor: [224, 232, 247], textColor: [26, 35, 126], fontStyle: 'bold' },
      alternateRowStyles: { fillColor: [240, 248, 255] },
      columnStyles: showTraineeCols ? {
        0: { cellWidth: 6, halign: 'center' },
        1: { cellWidth: 16 },
        2: { cellWidth: 26 },
        3: { cellWidth: 12 },
        4: { cellWidth: 16 },
        5: { cellWidth: 26 },
        6: { cellWidth: 14 },
        7: { cellWidth: 14 },
        8: { cellWidth: 16 },
        9: { cellWidth: 11 },
        10: { cellWidth: 16 },
        11: { cellWidth: 11 },
        12: { cellWidth: 10 },
        13: { cellWidth: 30 },
        14: { cellWidth: 40 },
        15: { cellWidth: 22 },
      } : {
        0: { cellWidth: 6, halign: 'center' },
        1: { cellWidth: 18 },
        2: { cellWidth: 16 },
        3: { cellWidth: 16 },
        4: { cellWidth: 18 },
        5: { cellWidth: 12 },
        6: { cellWidth: 18 },
        7: { cellWidth: 12 },
        8: { cellWidth: 12 },
        9: { cellWidth: 38 },
        10: { cellWidth: 55 },
        11: { cellWidth: 28 },
      },
    });

    // ── Footer ──
    const pages = doc.internal.getNumberOfPages();
    for (let p = 1; p <= pages; p++) {
      doc.setPage(p);
      doc.setFontSize(7);
      doc.setTextColor(120, 120, 120);
      doc.text('South East Central Railway — Raipur Division | RRB ALP Handling Report', margin, doc.internal.pageSize.getHeight() - 5);
      doc.text(`Page ${p} of ${pages}`, pageW - margin, doc.internal.pageSize.getHeight() - 5, { align: 'right' });
    }

    const filename = trainee !== 'all'
      ? `ALP_Report_${trainee.replace(/\s+/g,'_')}_${new Date().toISOString().slice(0,10)}.pdf`
      : `ALP_Report_All_${new Date().toISOString().slice(0,10)}.pdf`;

    doc.save(filename);
    showToast('✅ PDF downloaded!', 'success');
  } catch(err) {
    console.error(err);
    showToast('❌ PDF generation failed', 'error');
  }
}

// ════════════════════════════════════════════════════════
//  TOAST
// ════════════════════════════════════════════════════════
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = type;
  t.style.display = 'block';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.style.display = 'none'; }, 4000);
}

// ════════════════════════════════════════════════════════
//  LIVE CLOCK
// ════════════════════════════════════════════════════════
function updateLiveClock() {
  const now = new Date();
  const timeEl = document.getElementById('liveTime');
  const dateEl = document.getElementById('liveDate');
  if (timeEl) {
    timeEl.textContent = now.toLocaleTimeString('en-IN', { hour12: true, hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }
  if (dateEl) {
    dateEl.textContent = now.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
  }
}

// ════════════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  loadData();
  updateLiveClock();
  setInterval(updateLiveClock, 1000);
});
</script>
